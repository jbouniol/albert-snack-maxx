name: SnackMaxx
options:
  bundleIdPrefix: com.jbouniol
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  SnackMaxx:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SnackMaxx
        excludes:
          - "Info.plist"
    resources:
      - path: SnackMaxx/Fonts
      - path: SnackMaxx/Assets.xcassets
    info:
      path: SnackMaxx/Info.plist
      properties:
        CFBundleDisplayName: Snack Maxx
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIAppFonts:
          - BowlbyOne-Regular.ttf
          - ArchivoBlack-Regular.ttf
          - SpaceGrotesk-VariableFont_wght.ttf
          - Bungee-Regular.ttf
        NSCameraUsageDescription: "Snack Maxx utilise la caméra pour scanner le QR code des distributeurs."
        NSLocationWhenInUseUsageDescription: "Snack Maxx utilise ta position pour trouver le distributeur le plus proche."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jbouniol.snackmaxx
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
